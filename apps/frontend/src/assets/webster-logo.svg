    </text>
    <text
      x="2"
      y="27"
      fill="url(#w-fill)"
      stroke="url(#w-stroke)"
      stroke-width="0.65"
      paint-order="stroke fill"
      font-family="'Plus Jakarta Sans', system-ui, sans-serif"
      font-size="29"
      font-weight="800"
      letter-spacing="-0.06em"
    >
      webster
    </text>
    <text
      x="2"
      y="27"
      fill="url(#w-shine)"
      clip-path="url(#w-clip)"
      font-family="'Plus Jakarta Sans', system-ui, sans-serif"
      font-size="29"
      font-weight="800"
      letter-spacing="-0.06em"
    >
      webster
    </text>
  </g>
  <path
    d="M 54 31.5 Q 69 35.5 84 31.5"
    stroke="url(#w-accent)"
